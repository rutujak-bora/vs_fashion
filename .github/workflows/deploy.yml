name: Deploy Application to EC2

on:
  push:
    branches:
      - main # Deploys automatically when code is pushed to the main branch

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Build Frontend
        working-directory: ./frontend
        run: |
          npm install
          npm run build
        env:
          REACT_APP_BACKEND_URL: ${{ secrets.REACT_APP_BACKEND_URL }}

      - name: Deploy files to EC2 via SCP
        uses: appleboy/scp-action@v0.1.4
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "."
          target: "/home/${{ secrets.EC2_USER }}/web-main"
          exclude: ".git, node_modules, frontend/node_modules, backend/__pycache__"

      - name: Execute Deployment Script on EC2
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /home/${{ secrets.EC2_USER }}/web-main

            # Install Backend Dependencies
            cd backend
            python3 -m venv venv
            source venv/bin/activate
            pip install -r requirements.txt
            
            # Restart backend service via PM2 or Systemd (Replace 'backend_service' with your actual service name if using systemd)
            # pm2 restart server.py --interpreter python3 OR systemctl restart fastapi-app
            # Example using PM2:
            # pm2 start server.py --name fastapi-backend --interpreter=python3 || pm2 restart fastapi-backend

            # If you are using Nginx to serve the frontend, copy build files to the appropriate directory:
            echo "Copying frontend build files to Nginx web root"
            sudo cp -r /home/${{ secrets.EC2_USER }}/web-main/frontend/build/* /var/www/html/
            
            # Restart Nginx
            sudo systemctl restart nginx
